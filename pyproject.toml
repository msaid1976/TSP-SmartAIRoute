[tool.ruff]
target-version = "py312"
line-length = 100
src = [
  "apps/api/app",
  "apps/api/tests",
  "apps/worker/worker_app",
  "apps/worker/tests",
  "packages/shared/python/smartroute_shared",
]
extend-exclude = ["specs/notebooks", "specs/references/notebooks"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.pytest.ini_options]
testpaths = ["apps/api/tests", "apps/worker/tests"]
